name: Textlint

on:
  push:
    branches:
      - "main"
    paths:
      - "content/**"
      - ".textlintrc.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/textlint.yml"
  pull_request:
    branches:
      - "**"
    paths:
      - "content/**"
      - ".textlintrc.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/textlint.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  textlint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: ./package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Resolve target markdown files
        id: target
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { execSync } = require('child_process');
            let files = [];

            if (context.eventName === 'pull_request') {
              // PR: GitHub API で追加ファイルのみ取得
              const response = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
              });
              files = response.data
                .filter(f => f.status === 'added' && f.filename.startsWith('content/') && f.filename.endsWith('.md'))
                .map(f => f.filename);
            } else if (context.eventName === 'workflow_dispatch') {
              // 手動実行: 全ファイル対象
              const output = execSync('find content -name "*.md"').toString().trim();
              files = output ? output.split('\n') : [];
            } else {
              // push: git diff で追加ファイルのみ取得
              const before = context.payload.before;
              try {
                const output = execSync(
                  `git diff --name-only --diff-filter=A ${before} HEAD -- content/`,
                ).toString().trim();
                files = output ? output.split('\n').filter(f => f.endsWith('.md')) : [];
              } catch {
                files = [];
              }
            }

            core.setOutput('files', files.join(' '));
            core.setOutput('has_files', files.length > 0 ? 'true' : 'false');
            core.info(`Target files: ${files.join(', ') || '(none)'}`);

      - name: Run textlint
        id: textlint
        if: steps.target.outputs.has_files == 'true'
        continue-on-error: true
        run: |
          set -o pipefail
          npx textlint ${{ steps.target.outputs.files }} 2>&1 | tee textlint-result.txt

      - name: Comment textlint result to PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const hasFiles = '${{ steps.target.outputs.has_files }}' === 'true';
            let result = '';
            if (fs.existsSync('textlint-result.txt')) {
              result = fs.readFileSync('textlint-result.txt', 'utf8').trim();
            }

            const body = [
              '### Textlint Results',
              '',
              !hasFiles
                ? '_新規追加の Markdown ファイルなし。スキップしました。_'
                : '<details><summary>詳細を表示</summary>\n\n```\n' + (result || 'No errors found.') + '\n```\n\n</details>',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if textlint failed
        if: steps.textlint.outcome == 'failure'
        run: exit 1

